<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Contact ― CREATIVE GOLD</title>
  <meta name="description" content="CREATIVE GOLDへのお問い合わせ。プロジェクトのご相談、お見積もりのご依頼はこちらから。">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body class="sub-page">

  <!-- Header -->
  <header class="sub-header">
    <a href="../top-a.html" class="sub-header-logo"><img src="../img/logo_bk.png" alt="CREATIVE GOLD" style="height:24px; width:auto;"></a>
    <nav class="sub-header-nav" aria-label="メインナビゲーション">
      <a href="../service/index.html">Service</a>
      <a href="../about/index.html">About</a>
      <a href="../works/index.html">Works</a>
      <a href="../contact/index.html" class="is-current">Contact</a>
    </nav>
  </header>

  <main>

    <!-- Page Hero -->
    <section class="page-hero fade-in">
      <p class="page-hero-label">Contact</p>
      <h1 class="page-hero-title">Contact</h1>
      <p class="page-hero-subtitle">お問い合わせ</p>
    </section>

    <!-- Contact Form -->
    <section class="sub-section fade-in">
      <p class="sub-section-label">Get in Touch</p>
      <h2 class="sub-section-title">お気軽にご連絡ください</h2>
      <p class="sub-section-text" style="margin-bottom: var(--space-xl);">
        プロジェクトのご相談、お見積もりのご依頼、その他お問い合わせなど、下記フォームよりお送りください。<br>
        2営業日以内にご返信いたします。
      </p>

      <form class="contact-form" id="contact-form">
        <div class="form-group">
          <label class="form-label" for="contact-name">
            お名前 <span class="required">*</span>
          </label>
          <input type="text" class="form-input" id="contact-name" name="name" required placeholder="山田 太郎">
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-company">
            会社名・団体名
          </label>
          <input type="text" class="form-input" id="contact-company" name="company" placeholder="株式会社〇〇">
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-email">
            メールアドレス <span class="required">*</span>
          </label>
          <input type="email" class="form-input" id="contact-email" name="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-type">
            お問い合わせ種別
          </label>
          <select class="form-select" id="contact-type" name="type">
            <option value="">選択してください</option>
            <option value="project">プロジェクトのご相談</option>
            <option value="estimate">お見積もりのご依頼</option>
            <option value="ghost">裏方支援（CREATIVE GHOST）のご相談</option>
            <option value="consulting">WEB戦略コンサルのご相談</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="contact-message">
            お問い合わせ内容 <span class="required">*</span>
          </label>
          <textarea class="form-textarea" id="contact-message" name="message" required placeholder="プロジェクトの概要、ご要望、ご予算感、スケジュールなどをお聞かせください。"></textarea>
        </div>

        <button type="submit" class="form-submit" id="contact-submit">
          送信する
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </section>

  </main>

  <footer class="sub-footer">
    <p class="sub-footer-copy">&copy; 2025 CREATIVE GOLD</p>
    <a href="../top-a.html" class="sub-footer-back">← Back to Top</a>
  </footer>

  <script src="../js/theme.js"></script>
  <script src="../js/common.js"></script>
</body>
</html>
