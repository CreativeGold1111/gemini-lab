<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CREATIVE GOLD</title>
  <meta name="description" content="CREATIVE GOLD - クリエイティブの力で、ビジネスを加速する。">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/entry.css">
</head>
<body>

  <main class="entry-page" id="entry-page">
    <div class="entry-content">

      <img src="img/logo_bk.png" alt="CREATIVE GOLD" class="entry-brand" style="max-width:200px; height:auto;">

      <h1 class="entry-question">
        あなたがビジネスで<br>
        <em>一番大事</em>だと思うのは？
      </h1>

      <p class="entry-subtitle">選んだ答えで、あなたに合ったページをご案内します。</p>

      <div class="entry-choices" role="group" aria-label="ビジネスで大事なこと">

        <button class="entry-choice" data-route="a" id="choice-sincerity" type="button">
          <span class="choice-number">01</span>
          <div class="choice-text">
            <p class="choice-label">お仕事に対する誠実さ</p>
            <p class="choice-desc">信頼できるパートナーと、着実に成果を積み上げたい方へ。</p>
          </div>
          <span class="choice-arrow">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </button>

        <button class="entry-choice" data-route="b" id="choice-unique" type="button">
          <span class="choice-number">02</span>
          <div class="choice-text">
            <p class="choice-label">ユニークさ、雰囲気</p>
            <p class="choice-desc">他にはない個性的なクリエイティブを求めている方へ。</p>
          </div>
          <span class="choice-arrow">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </button>

        <button class="entry-choice" data-route="c" id="choice-works" type="button">
          <span class="choice-number">03</span>
          <div class="choice-text">
            <p class="choice-label">過去に作成してきた実績</p>
            <p class="choice-desc">実際のアウトプットを見て判断したい方へ。</p>
          </div>
          <span class="choice-arrow">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </button>

      </div>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/entry.js"></script>
</body>
</html>
